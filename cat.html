<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐱 虛擬貓咪</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff9a9e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="虛擬貓咪">
  <script src="sounds/cat-sounds.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      transition: background 1.2s ease;
    }
    body.mood-sad    { background: linear-gradient(160deg, #e0e0e0 0%, #bdbdbd 100%); }
    body.mood-dirty  { background: linear-gradient(160deg, #dcedc8 0%, #aed581 100%); }
    body.mood-sleepy { background: linear-gradient(160deg, #e8eaf6 0%, #9fa8da 100%); }
    body.mood-angry  { background: linear-gradient(160deg, #fce4ec 0%, #f48fb1 100%); }

    .app {
      background: rgba(255,255,255,0.93);
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      padding: 20px 20px 24px;
      width: 100%; max-width: 380px;
    }

    .header { text-align: center; margin-bottom: 12px; }
    .cat-name { font-size: 1.1rem; font-weight: 700; color: #333; }
    .cat-age  { font-size: 0.76rem; color: #aaa; margin-top: 2px; }

    .cat-area {
      position: relative;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 16px;
    }

    .speech-bubble {
      background: white;
      border: 2px solid #f0e0e0;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 0.87rem; color: #555;
      margin-bottom: 10px;
      max-width: 240px; min-height: 34px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      position: relative;
    }
    .speech-bubble::after {
      content: ''; position: absolute; bottom: -11px; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent; border-top-color: #f0e0e0;
    }
    .speech-bubble::before {
      content: ''; position: absolute; bottom: -8px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent; border-top-color: white; z-index: 1;
    }

    .cat-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }

    #catImg {
      height: 150px; width: 150px;
      object-fit: cover; border-radius: 50%;
      cursor: pointer; display: block;
      animation: idle 2.5s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      border: 3px solid rgba(255,255,255,0.8);
    }
    #catImg.bounce   { animation: bounce 0.6s ease forwards; }
    #catImg.sleeping { animation: sleeping 3.5s ease-in-out infinite; }
    #catImg.shake    { animation: shake 0.5s ease forwards; }

    .cat-status {
      font-size: 0.78rem; color: #999;
      background: white;
      border-radius: 12px;
      padding: 2px 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    @keyframes idle {
      0%,100% { transform: translateY(0) rotate(0deg); }
      35% { transform: translateY(-6px) rotate(-1.5deg); }
      70% { transform: translateY(-4px) rotate(1deg); }
    }
    @keyframes bounce {
      0%  { transform: scale(1) rotate(0); }
      20% { transform: scale(1.18) rotate(-7deg); }
      45% { transform: scale(0.92) rotate(4deg); }
      70% { transform: scale(1.06) rotate(-2deg); }
      100%{ transform: scale(1) rotate(0); }
    }
    @keyframes sleeping {
      0%,100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-3px) rotate(2deg); }
    }
    @keyframes shake {
      0%  { transform: translateX(0); }
      15% { transform: translateX(-8px) rotate(-5deg); }
      30% { transform: translateX(8px) rotate(5deg); }
      45% { transform: translateX(-6px) rotate(-3deg); }
      60% { transform: translateX(6px) rotate(3deg); }
      75% { transform: translateX(-3px); }
      100%{ transform: translateX(0) rotate(0); }
    }

    .float-effect {
      position: absolute; font-size: 20px;
      pointer-events: none;
      animation: float-up 1.4s ease-out forwards;
      z-index: 20;
    }
    @keyframes float-up {
      0%   { opacity:1; transform: translateY(0) scale(0.8); }
      30%  { opacity:1; transform: translateY(-20px) scale(1.2); }
      100% { opacity:0; transform: translateY(-78px) scale(0.9); }
    }

    .stats { margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px; }
    .stat-row { display: flex; align-items: center; gap: 9px; }
    .stat-icon  { font-size: 17px; width: 22px; flex-shrink: 0; }
    .stat-label { font-size: 0.8rem; color: #666; width: 50px; flex-shrink: 0; }
    .stat-bar-bg { flex: 1; height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
    .stat-bar {
      height: 100%; border-radius: 5px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1), background-color 0.6s;
    }
    .stat-value {
      font-size: 0.76rem; color: #bbb;
      width: 26px; text-align: right; flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .alert {
      text-align: center; font-size: 0.79rem; color: #e53935;
      min-height: 18px; margin-bottom: 8px; transition: opacity 0.3s;
    }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .action-btn {
      padding: 13px 8px 11px; border: none; border-radius: 16px;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px;
      transition: transform 0.12s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      position: relative; overflow: hidden;
    }
    .action-btn:active   { transform: scale(0.93); }
    .action-btn:disabled { opacity: 0.4; cursor: default; transform: none !important; }
    .action-btn .btn-icon  { font-size: 28px; }
    .action-btn .btn-label { font-size: 0.8rem; font-weight: 600; }

    .btn-feed  { background: #fff3e0; color: #e65100; }
    .btn-clean { background: #e3f2fd; color: #1565c0; }
    .btn-pet   { background: #fce4ec; color: #c2185b; }
    .btn-play  { background: #e8f5e9; color: #2e7d32; }
    .btn-scare { background: #fff8e1; color: #f57f17; }
    .btn-sleep {
      grid-column: 1 / -1;
      background: #ede7f6; color: #4527a0;
      display: none;
    }
    .btn-sleep.visible { display: flex; }

    .cooldown-bar {
      position: absolute; bottom: 0; left: 0;
      height: 3px; background: rgba(0,0,0,0.18);
      border-radius: 0 0 16px 16px;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="cat-name">🐾 小橘</div>
    <div class="cat-age" id="catAge">第 1 天 · 小貓咪</div>
  </div>

  <div class="cat-area" id="catArea">
    <div class="speech-bubble" id="speechBubble">呼嚕呼嚕♪</div>
    <div class="cat-wrap">
      <img id="catImg" src="cats/kaixin.png" alt="小橘" onclick="petCat()">
      <div class="cat-status" id="catStatus">開心</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="stat-icon">🍖</span><span class="stat-label">飽食度</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-fullness"></div></div>
      <span class="stat-value" id="val-fullness">80</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">🛁</span><span class="stat-label">清潔度</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-cleanliness"></div></div>
      <span class="stat-value" id="val-cleanliness">90</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">💖</span><span class="stat-label">心情</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-happiness"></div></div>
      <span class="stat-value" id="val-happiness">75</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">⚡</span><span class="stat-label">活力</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-energy"></div></div>
      <span class="stat-value" id="val-energy">60</span>
    </div>
  </div>

  <div class="alert" id="alertMsg"></div>

  <div class="actions">
    <button class="action-btn btn-feed"  id="btnFeed"  onclick="feedCat()">
      <span class="btn-icon">🍣</span><span class="btn-label">餵食</span>
      <div class="cooldown-bar" id="cd-feed" style="width:0"></div>
    </button>
    <button class="action-btn btn-clean" id="btnClean" onclick="cleanCat()">
      <span class="btn-icon">🛁</span><span class="btn-label">清潔</span>
      <div class="cooldown-bar" id="cd-clean" style="width:0"></div>
    </button>
    <button class="action-btn btn-pet"   id="btnPet"   onclick="petCat()">
      <span class="btn-icon">🤍</span><span class="btn-label">撫摸</span>
      <div class="cooldown-bar" id="cd-pet" style="width:0"></div>
    </button>
    <button class="action-btn btn-play"  id="btnPlay"  onclick="playCat()">
      <span class="btn-icon">🎾</span><span class="btn-label">逗貓</span>
      <div class="cooldown-bar" id="cd-play" style="width:0"></div>
    </button>
    <button class="action-btn btn-scare" id="btnScare" onclick="scareCat()">
      <span class="btn-icon">😱</span><span class="btn-label">嚇貓</span>
      <div class="cooldown-bar" id="cd-scare" style="width:0"></div>
    </button>
    <button class="action-btn btn-sleep" id="btnSleep" onclick="sleepCat()">
      <span class="btn-icon">😴</span><span class="btn-label">讓貓咪睡覺</span>
      <div class="cooldown-bar" id="cd-sleep" style="width:0"></div>
    </button>
  </div>
</div>

<script>
// ── CAT IMAGES ───────────────────────────────────────────────────────────────
const STATE_IMG = {
  happy:    'cats/kaixin.png',
  ecstatic: 'cats/xihuan.png',
  sleepy:   'cats/pilei.png',
  hungry:   'cats/duzi.png',
  dirty:    'cats/shengqi.png',
  unhappy:  'cats/shengqi.png',
  angry:    'cats/shengqi.png',
};
const REACTION_IMG = { pet: 'cats/shufu.png', feed: 'cats/chbao.png' };
let reactionActive = false, reactionTm;

function showReaction(type) {
  const img = document.getElementById('catImg');
  img.src = REACTION_IMG[type];
  reactionActive = true;
  clearTimeout(reactionTm);
  reactionTm = setTimeout(() => {
    reactionActive = false;
    img.src = STATE_IMG[getCatState()] || STATE_IMG.happy;
  }, 2500);
}

function updateCatImage() {
  if (!reactionActive)
    document.getElementById('catImg').src = STATE_IMG[getCatState()] || STATE_IMG.happy;
}

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const DECAY     = { fullness: 30, cleanliness: 45, happiness: 60 };
const E_RESTORE = 120;
const COOLDOWNS = { feed: 3000, clean: 5000, pet: 1500, play: 4000, scare: 8000, sleep: 20000 };
const cooldownEnd = { feed:0, clean:0, pet:0, play:0, scare:0, sleep:0 };

const MESSAGES = {
  idle: {
    happy:    ['呼嚕呼嚕♪', '好滿足～', '今天天氣不錯！', '（搖尾巴）', '摸摸我嘛～', '我愛你！♡'],
    ecstatic: ['我超開心！！', '今天是最好的一天！', '喵喵喵♡♡♡', '愛你喔～'],
    hungry:   ['好餓喔...', '可以吃飯了嗎？', '肚子咕嚕咕嚕', '喵～想吃東西'],
    dirty:    ['我好髒...', '幫我洗澡嘛', '...臭臭的', '好不舒服'],
    unhappy:  ['哼...', '理我一下嘛！', '好無聊...', '嗚嗚嗚', '不理你了'],
    sleepy:   ['想睡覺...', 'Zzz...', '好累喔...', '眼睛好重...'],
  },
  feed:  ['好吃！！', '謝謝你！', '喵嗚！美味！', '還要還要！', '我最愛吃東西了！'],
  clean: ['舒服～', '好香喔！', '我最愛乾淨了！', '謝謝你幫我洗澡！', '亮晶晶✨'],
  pet:   ['呼嚕呼嚕♪', '再摸一下嘛～', '好舒服...', '喜歡！喜歡！', '嗯嗯嗯♡'],
  play:  ['抓到了！', '喵！！！', '好好玩！！', '再一次！！', '我最強！', '耶～！'],
  scare: ['哇！！！', '嚇死我了！', '你幹嘛啦！！', '太過分了！', '喵—！！！'],
  sleep: ['Zzz...', '好想睡...', '（蜷成一團）', '睡一下就好...'],
  wake:  ['（打哈欠）', '睡飽了！', '又有精神了！', '喵～早安！'],
};

// ── STATE ────────────────────────────────────────────────────────────────────
let stats, birthDate, lastSaved;

function loadState() {
  const raw = localStorage.getItem('catData3');
  if (raw) {
    try {
      const d = JSON.parse(raw);
      birthDate = d.birthDate;
      lastSaved = d.lastSaved || Date.now();
      const elapsed = (Date.now() - lastSaved) / 1000;
      stats = {
        fullness:    clamp(d.stats.fullness    - elapsed / DECAY.fullness),
        cleanliness: clamp(d.stats.cleanliness - elapsed / DECAY.cleanliness),
        happiness:   clamp(d.stats.happiness   - elapsed / DECAY.happiness),
        energy:      clamp(d.stats.energy      + elapsed / E_RESTORE),
      };
      if (elapsed > 600)
        setTimeout(() => showMessage(`你離開了 ${Math.round(elapsed/60)} 分鐘，小橘好想你！`), 600);
      return;
    } catch(e) {}
  }
  birthDate = new Date().toISOString().split('T')[0];
  stats = { fullness: 80, cleanliness: 90, happiness: 75, energy: 60 };
  lastSaved = Date.now();
}

function saveState() {
  lastSaved = Date.now();
  localStorage.setItem('catData3', JSON.stringify({ stats, birthDate, lastSaved }));
}

function clamp(v) { return Math.max(0, Math.min(100, v)); }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getCatState() {
  const { fullness, cleanliness, happiness, energy } = stats;
  if (energy < 20)      return 'sleepy';
  if (fullness < 25)    return 'hungry';
  if (cleanliness < 25) return 'dirty';
  if (happiness < 25)   return 'unhappy';
  if (fullness > 75 && cleanliness > 75 && happiness > 80 && energy > 65) return 'ecstatic';
  return 'happy';
}

// ── UI ───────────────────────────────────────────────────────────────────────
let speechTm, alertTm;

function showMessage(msg) {
  document.getElementById('speechBubble').textContent = msg;
  clearTimeout(speechTm);
  speechTm = setTimeout(refreshIdle, 3500);
}

function refreshIdle() {
  const pool = MESSAGES.idle[getCatState()] || MESSAGES.idle.happy;
  document.getElementById('speechBubble').textContent = rand(pool);
}

function showAlert(msg) {
  const el = document.getElementById('alertMsg');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(alertTm);
  alertTm = setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = ''; }, 300);
  }, 2500);
}

function animateCat(type) {
  const el = document.getElementById('catImg');
  el.classList.remove('bounce', 'sleeping', 'shake');
  void el.offsetWidth;
  if (type) {
    el.classList.add(type);
    if (type === 'bounce' || type === 'shake')
      setTimeout(() => el.classList.remove(type), 650);
  }
}

function spawnEffect(emoji, offX) {
  const area = document.getElementById('catArea');
  const el = document.createElement('span');
  el.className = 'float-effect';
  el.textContent = emoji;
  el.style.left = (28 + (offX || 0) + Math.random() * 36) + '%';
  el.style.top  = '55%';
  area.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function startCooldown(action) {
  const ms = COOLDOWNS[action];
  cooldownEnd[action] = Date.now() + ms;
  const key = action[0].toUpperCase() + action.slice(1);
  const btn = document.getElementById('btn' + key);
  const bar = document.getElementById('cd-' + action);
  if (btn) btn.disabled = true;
  const iv = setInterval(() => {
    const rem = cooldownEnd[action] - Date.now();
    if (rem <= 0) {
      clearInterval(iv);
      if (bar) bar.style.width = '0';
      if (btn) btn.disabled = false;
    } else {
      if (bar) bar.style.width = (rem / ms * 100) + '%';
    }
  }, 50);
}

const STATE_LABEL = { happy:'開心', ecstatic:'超開心！', sleepy:'好睏喔', hungry:'肚子餓了', dirty:'需要清潔', unhappy:'不開心' };
const STATE_MOOD  = { sleepy:'mood-sleepy', hungry:'mood-sad', dirty:'mood-dirty', unhappy:'mood-sad' };

function updateUI() {
  const state = getCatState();
  updateCatImage();
  document.getElementById('catStatus').textContent = STATE_LABEL[state] || '開心';
  document.body.className = STATE_MOOD[state] || '';

  document.getElementById('btnSleep').classList.toggle('visible', stats.energy < 35);

  for (const key of ['fullness','cleanliness','happiness','energy']) {
    const v = stats[key];
    const bar = document.getElementById('bar-' + key);
    bar.style.width = v + '%';
    bar.style.backgroundColor = v > 55 ? '#66bb6a' : v > 28 ? '#ffa726' : '#ef5350';
    document.getElementById('val-' + key).textContent = Math.round(v);
  }

  const days = Math.floor((Date.now() - new Date(birthDate)) / 86400000) + 1;
  document.getElementById('catAge').textContent = `第 ${days} 天 · 小貓咪`;
  saveState();
}

// ── SOUND ────────────────────────────────────────────────────────────────────
function playSound(type) {
  try {
    const sounds = (typeof CAT_SOUNDS !== 'undefined') ? CAT_SOUNDS : {};
    const src = sounds[type] || sounds['meow'];
    if (!src) return;
    const audio = new Audio(src);
    audio.volume = 0.75;
    audio.play().catch(() => {});
  } catch(e) {}
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function feedCat() {
  if (stats.fullness >= 98) { showAlert('我已經很飽了！'); return; }
  stats.fullness  = clamp(stats.fullness + 30);
  stats.happiness = clamp(stats.happiness + 5);
  animateCat('bounce');
  showMessage(rand(MESSAGES.feed));
  spawnEffect('🍣'); spawnEffect('✨', 22);
  playSound('happy');
  showReaction('feed');
  startCooldown('feed');
  updateUI();
}

function cleanCat() {
  if (stats.cleanliness >= 96) { showAlert('我已經很乾淨了！'); return; }
  stats.cleanliness = clamp(stats.cleanliness + 55);
  stats.happiness   = clamp(stats.happiness + 10);
  animateCat('bounce');
  showMessage(rand(MESSAGES.clean));
  spawnEffect('✨'); spawnEffect('💧', 22);
  playSound('meow');
  startCooldown('clean');
  updateUI();
}

function petCat() {
  if (stats.energy < 8) { showAlert('太累了，想睡覺...'); return; }
  stats.happiness = clamp(stats.happiness + 18);
  stats.energy    = clamp(stats.energy - 3);
  animateCat('bounce');
  showMessage(rand(MESSAGES.pet));
  spawnEffect('💕'); spawnEffect('💗', 22);
  playSound('happy');
  showReaction('pet');
  startCooldown('pet');
  updateUI();
}

function playCat() {
  if (stats.energy < 15)   { showAlert('太累了，沒力氣玩...'); return; }
  if (stats.fullness < 15) { showAlert('太餓了，沒力氣玩...'); return; }
  stats.happiness = clamp(stats.happiness + 25);
  stats.energy    = clamp(stats.energy - 20);
  stats.fullness  = clamp(stats.fullness - 10);
  animateCat('bounce');
  showMessage(rand(MESSAGES.play));
  spawnEffect('🎾'); spawnEffect('⭐', 22);
  playSound('play');
  startCooldown('play');
  updateUI();
}

function scareCat() {
  stats.happiness = clamp(stats.happiness - 20);
  reactionActive = true;
  document.getElementById('catImg').src = STATE_IMG.angry;
  document.body.className = 'mood-angry';
  animateCat('shake');
  showMessage(rand(MESSAGES.scare));
  spawnEffect('💢'); spawnEffect('😤', 22);
  playSound('angry');
  startCooldown('scare');
  clearTimeout(reactionTm);
  reactionTm = setTimeout(() => {
    reactionActive = false;
    updateUI();
  }, 2500);
}

function sleepCat() {
  stats.energy = clamp(stats.energy + 45);
  animateCat('sleeping');
  showMessage(rand(MESSAGES.sleep));
  spawnEffect('💤'); spawnEffect('⭐', 22);
  startCooldown('sleep');
  setTimeout(() => {
    reactionActive = false;
    animateCat('bounce');
    showMessage(rand(MESSAGES.wake));
    playSound('meow');
    updateUI();
  }, 3000);
  updateUI();
}

// ── TICK ─────────────────────────────────────────────────────────────────────
let lastTick = Date.now();
function tick() {
  const now = Date.now();
  const e = (now - lastTick) / 1000;
  lastTick = now;
  stats.fullness    = clamp(stats.fullness    - e / DECAY.fullness);
  stats.cleanliness = clamp(stats.cleanliness - e / DECAY.cleanliness);
  stats.happiness   = clamp(stats.happiness   - e / DECAY.happiness);
  if (stats.energy < 100) stats.energy = clamp(stats.energy + e / E_RESTORE);
  updateUI();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadState();
updateUI();
refreshIdle();
setInterval(tick, 1000);
setInterval(refreshIdle, 9000);

if ('serviceWorker' in navigator)
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
</script>
</body>
</html>
