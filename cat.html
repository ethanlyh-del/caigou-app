<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐱 虛擬貓咪</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff9a9e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="虛擬貓咪">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background 1s ease;
    }

    body.mood-sad { background: linear-gradient(160deg, #e0e0e0 0%, #bdbdbd 100%); }
    body.mood-dirty { background: linear-gradient(160deg, #dcedc8 0%, #aed581 100%); }
    body.mood-sleepy { background: linear-gradient(160deg, #e8eaf6 0%, #9fa8da 100%); }

    .app {
      background: rgba(255,255,255,0.92);
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      padding: 24px 20px 28px;
      width: 100%;
      max-width: 380px;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    .cat-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
    }

    .cat-age {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 2px;
    }

    /* Cat display */
    .cat-area {
      position: relative;
      text-align: center;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .speech-bubble {
      background: white;
      border: 2px solid #f0e0e0;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 0.88rem;
      color: #555;
      margin-bottom: 14px;
      position: relative;
      min-height: 36px;
      max-width: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -11px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #f0e0e0;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: white;
      z-index: 1;
    }

    .cat-wrap {
      position: relative;
      display: inline-block;
    }

    .cat-emoji {
      font-size: 82px;
      line-height: 1;
      cursor: pointer;
      display: inline-block;
      animation: idle 2.5s ease-in-out infinite;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cat-emoji.bounce {
      animation: bounce 0.6s ease forwards, idle 2.5s ease-in-out 0.6s infinite;
    }

    .cat-status-badge {
      position: absolute;
      bottom: -4px;
      right: -12px;
      background: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.72rem;
      color: #888;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      white-space: nowrap;
    }

    @keyframes idle {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      30% { transform: translateY(-7px) rotate(-1deg); }
      70% { transform: translateY(-5px) rotate(1deg); }
    }

    @keyframes bounce {
      0%   { transform: scale(1) rotate(0deg); }
      20%  { transform: scale(1.25) rotate(-8deg); }
      45%  { transform: scale(0.88) rotate(5deg); }
      65%  { transform: scale(1.1) rotate(-3deg); }
      85%  { transform: scale(0.96) rotate(1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* Floating effects */
    .float-effect {
      position: absolute;
      font-size: 22px;
      pointer-events: none;
      animation: float-up 1.4s ease-out forwards;
      z-index: 20;
    }

    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) scale(0.8); }
      30%  { opacity: 1; transform: translateY(-20px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.9); }
    }

    /* Stats */
    .stats {
      margin-bottom: 22px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-icon {
      font-size: 18px;
      width: 24px;
      flex-shrink: 0;
    }

    .stat-label {
      font-size: 0.82rem;
      color: #666;
      width: 52px;
      flex-shrink: 0;
    }

    .stat-bar-bg {
      flex: 1;
      height: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      overflow: hidden;
    }

    .stat-bar {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1), background-color 0.6s ease;
    }

    .stat-value {
      font-size: 0.78rem;
      color: #aaa;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* Action Buttons */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action-btn {
      padding: 14px 10px 12px;
      border: none;
      border-radius: 18px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .action-btn:active { transform: scale(0.93); }
    .action-btn:disabled { opacity: 0.45; cursor: default; transform: none !important; }

    .action-btn .btn-icon { font-size: 30px; }
    .action-btn .btn-label { font-size: 0.82rem; }

    .btn-feed  { background: #fff3e0; color: #e65100; box-shadow: 0 4px 14px rgba(230,81,0,0.15); }
    .btn-clean { background: #e3f2fd; color: #1565c0; box-shadow: 0 4px 14px rgba(21,101,192,0.15); }
    .btn-pet   { background: #fce4ec; color: #c2185b; box-shadow: 0 4px 14px rgba(194,24,91,0.15); }
    .btn-play  { background: #e8f5e9; color: #2e7d32; box-shadow: 0 4px 14px rgba(46,125,50,0.15); }

    .btn-feed:hover:not(:disabled)  { box-shadow: 0 6px 20px rgba(230,81,0,0.25); }
    .btn-clean:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(21,101,192,0.25); }
    .btn-pet:hover:not(:disabled)   { box-shadow: 0 6px 20px rgba(194,24,91,0.25); }
    .btn-play:hover:not(:disabled)  { box-shadow: 0 6px 20px rgba(46,125,50,0.25); }

    /* Cooldown overlay */
    .cooldown-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: rgba(0,0,0,0.2);
      border-radius: 0 0 18px 18px;
      transition: width 0.1s linear;
    }

    /* Alert message */
    .alert {
      text-align: center;
      font-size: 0.8rem;
      color: #e53935;
      min-height: 20px;
      margin-bottom: 12px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="cat-name">🐾 小橘</div>
    <div class="cat-age" id="catAge">載入中...</div>
  </div>

  <div class="cat-area" id="catArea">
    <div class="speech-bubble" id="speechBubble">呼嚕呼嚕♪</div>
    <div class="cat-wrap">
      <div class="cat-emoji" id="catEmoji" onclick="petCat()">😸</div>
      <div class="cat-status-badge" id="catStatus">開心</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="stat-icon">🍖</span>
      <span class="stat-label">飽食度</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-fullness"></div></div>
      <span class="stat-value" id="val-fullness">80</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">🛁</span>
      <span class="stat-label">清潔度</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-cleanliness"></div></div>
      <span class="stat-value" id="val-cleanliness">90</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">💖</span>
      <span class="stat-label">心情</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-happiness"></div></div>
      <span class="stat-value" id="val-happiness">75</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">⚡</span>
      <span class="stat-label">活力</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-energy"></div></div>
      <span class="stat-value" id="val-energy">60</span>
    </div>
  </div>

  <div class="alert" id="alertMsg"></div>

  <div class="actions">
    <button class="action-btn btn-feed" id="btnFeed" onclick="feedCat()">
      <span class="btn-icon">🍣</span>
      <span class="btn-label">餵食</span>
      <div class="cooldown-bar" id="cd-feed" style="width:0"></div>
    </button>
    <button class="action-btn btn-clean" id="btnClean" onclick="cleanCat()">
      <span class="btn-icon">🛁</span>
      <span class="btn-label">清潔</span>
      <div class="cooldown-bar" id="cd-clean" style="width:0"></div>
    </button>
    <button class="action-btn btn-pet" id="btnPet" onclick="petCat()">
      <span class="btn-icon">🤍</span>
      <span class="btn-label">撫摸</span>
      <div class="cooldown-bar" id="cd-pet" style="width:0"></div>
    </button>
    <button class="action-btn btn-play" id="btnPlay" onclick="playCat()">
      <span class="btn-icon">🎾</span>
      <span class="btn-label">逗貓</span>
      <div class="cooldown-bar" id="cd-play" style="width:0"></div>
    </button>
  </div>
</div>

<script>
  const DECAY_RATES = { fullness: 30, cleanliness: 45, happiness: 60 };
  const ENERGY_RESTORE = 120;
  const BIRTH_DATE = '2025-01-01';

  const MESSAGES = {
    idle: {
      happy:   ['呼嚕呼嚕♪', '好滿足～', '今天天氣不錯！', '（搖尾巴）', '摸摸我嘛～', '我愛你！♡'],
      hungry:  ['好餓喔...', '可以吃飯了嗎？', '肚子咕嚕咕嚕', '喵～想吃東西'],
      dirty:   ['我好髒...', '幫我洗澡嘛', '...臭臭的', '好不舒服'],
      unhappy: ['哼...', '理我一下嘛！', '好無聊...', '嗚嗚嗚', '不理你了'],
      sleepy:  ['想睡覺...', 'Zzz...', '好累喔...', '眼睛好重...'],
      ecstatic:['我好開心！！', '今天是最好的一天！', '喵喵喵♡♡♡'],
    },
    feed:  ['好吃！！', '謝謝你！', '喵嗚！美味！', '還要還要！', '我最愛吃東西了！'],
    clean: ['舒服～', '好香喔！', '我最愛乾淨了！', '謝謝你幫我洗澡！', '亮晶晶✨'],
    pet:   ['呼嚕呼嚕♪', '再摸一下嘛～', '好舒服...', '喜歡！喜歡！', '嗯嗯嗯♡'],
    play:  ['抓到了！', '喵！！！', '好好玩！！', '再一次！！', '我最強！', '耶～！'],
    tooFull:  ['我已經很飽了！'],
    tooClean: ['我已經很乾淨了！'],
    tooTired: ['太累了，想睡覺...'],
    tooHungry:['好餓，沒力氣玩...'],
  };

  const STATE_CONFIG = {
    ecstatic: { emoji: '😻', label: '超開心！', moodClass: '' },
    happy:    { emoji: '😸', label: '開心',     moodClass: '' },
    sleepy:   { emoji: '😴', label: '好睏喔',   moodClass: 'mood-sleepy' },
    hungry:   { emoji: '😿', label: '肚子餓了', moodClass: 'mood-sad' },
    dirty:    { emoji: '🙀', label: '需要清潔', moodClass: 'mood-dirty' },
    unhappy:  { emoji: '😾', label: '不開心',   moodClass: 'mood-sad' },
  };

  // Cooldowns (ms)
  const COOLDOWNS = { feed: 3000, clean: 5000, pet: 1500, play: 4000 };
  const cooldownEnd = { feed: 0, clean: 0, pet: 0, play: 0 };

  let stats;
  let lastSaved;

  function loadState() {
    const raw = localStorage.getItem('catData');
    if (raw) {
      try {
        const data = JSON.parse(raw);
        lastSaved = data.lastSaved || Date.now();
        const elapsed = (Date.now() - lastSaved) / 1000;
        stats = {
          fullness:    clamp(data.stats.fullness    - elapsed / DECAY_RATES.fullness),
          cleanliness: clamp(data.stats.cleanliness - elapsed / DECAY_RATES.cleanliness),
          happiness:   clamp(data.stats.happiness   - elapsed / DECAY_RATES.happiness),
          energy:      clamp(data.stats.energy      + elapsed / ENERGY_RESTORE),
        };
        if (elapsed > 600) {
          // Been away more than 10 minutes
          setTimeout(() => showMessage(`你離開了 ${Math.round(elapsed/60)} 分鐘，小橘好想你！`), 500);
        }
        return;
      } catch(e) {}
    }
    // New cat
    stats = { fullness: 80, cleanliness: 90, happiness: 75, energy: 60 };
    lastSaved = Date.now();
  }

  function saveState() {
    lastSaved = Date.now();
    localStorage.setItem('catData', JSON.stringify({ stats, lastSaved }));
  }

  function clamp(v) { return Math.max(0, Math.min(100, Math.round(v * 10) / 10)); }

  function getCatState() {
    const { fullness, cleanliness, happiness, energy } = stats;
    if (energy < 20) return 'sleepy';
    if (fullness < 25) return 'hungry';
    if (cleanliness < 25) return 'dirty';
    if (happiness < 25) return 'unhappy';
    if (fullness > 75 && cleanliness > 75 && happiness > 80 && energy > 70) return 'ecstatic';
    return 'happy';
  }

  function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  let speechTimeout;
  function showMessage(msg) {
    const bubble = document.getElementById('speechBubble');
    bubble.textContent = msg;
    clearTimeout(speechTimeout);
    speechTimeout = setTimeout(refreshIdleMessage, 3500);
  }

  function refreshIdleMessage() {
    const state = getCatState();
    const pool = MESSAGES.idle[state] || MESSAGES.idle.happy;
    document.getElementById('speechBubble').textContent = randomItem(pool);
  }

  let alertTimeout;
  function showAlert(msg) {
    const el = document.getElementById('alertMsg');
    el.textContent = msg;
    el.style.opacity = '1';
    clearTimeout(alertTimeout);
    alertTimeout = setTimeout(() => { el.style.opacity = '0'; setTimeout(() => { el.textContent = ''; }, 300); }, 2500);
  }

  function animateCat() {
    const el = document.getElementById('catEmoji');
    el.classList.remove('bounce');
    void el.offsetWidth;
    el.classList.add('bounce');
  }

  function spawnEffect(emoji, offsetX) {
    const area = document.getElementById('catArea');
    const el = document.createElement('span');
    el.className = 'float-effect';
    el.textContent = emoji;
    const base = 35 + (offsetX || 0);
    el.style.left = (base + Math.random() * 30) + '%';
    el.style.top = '55%';
    area.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }

  function startCooldown(action) {
    const ms = COOLDOWNS[action];
    cooldownEnd[action] = Date.now() + ms;
    const btn = document.getElementById('btn' + action.charAt(0).toUpperCase() + action.slice(1));
    const bar = document.getElementById('cd-' + action);
    btn.disabled = true;

    const interval = setInterval(() => {
      const remaining = cooldownEnd[action] - Date.now();
      if (remaining <= 0) {
        clearInterval(interval);
        bar.style.width = '0';
        btn.disabled = false;
      } else {
        bar.style.width = ((remaining / ms) * 100) + '%';
      }
    }, 50);
  }

  function updateUI() {
    const state = getCatState();
    const cfg = STATE_CONFIG[state];

    document.getElementById('catEmoji').textContent = cfg.emoji;
    document.getElementById('catStatus').textContent = cfg.label;

    // Body mood class
    document.body.className = cfg.moodClass;

    const statKeys = ['fullness', 'cleanliness', 'happiness', 'energy'];
    for (const key of statKeys) {
      const val = stats[key];
      const bar = document.getElementById('bar-' + key);
      const valEl = document.getElementById('val-' + key);
      bar.style.width = val + '%';
      bar.style.backgroundColor = val > 55 ? '#66bb6a' : val > 28 ? '#ffa726' : '#ef5350';
      valEl.textContent = Math.round(val);
    }

    // Cat age display
    const born = new Date(BIRTH_DATE);
    const now = new Date();
    const days = Math.floor((now - born) / 86400000);
    document.getElementById('catAge').textContent = `第 ${days} 天 · 小貓咪`;

    saveState();
  }

  function feedCat() {
    if (stats.fullness >= 98) { showAlert(randomItem(MESSAGES.tooFull)); return; }
    stats.fullness    = clamp(stats.fullness + 30);
    stats.happiness   = clamp(stats.happiness + 5);
    animateCat();
    showMessage(randomItem(MESSAGES.feed));
    spawnEffect('🍣'); spawnEffect('✨', 20);
    startCooldown('feed');
    updateUI();
  }

  function cleanCat() {
    if (stats.cleanliness >= 96) { showAlert(randomItem(MESSAGES.tooClean)); return; }
    stats.cleanliness = clamp(stats.cleanliness + 55);
    stats.happiness   = clamp(stats.happiness + 10);
    animateCat();
    showMessage(randomItem(MESSAGES.clean));
    spawnEffect('✨'); spawnEffect('💧', 25);
    startCooldown('clean');
    updateUI();
  }

  function petCat() {
    if (stats.energy < 8) { showAlert(randomItem(MESSAGES.tooTired)); return; }
    stats.happiness   = clamp(stats.happiness + 18);
    stats.energy      = clamp(stats.energy - 3);
    animateCat();
    showMessage(randomItem(MESSAGES.pet));
    spawnEffect('💕'); spawnEffect('💗', 20);
    startCooldown('pet');
    updateUI();
  }

  function playCat() {
    if (stats.energy < 15) { showAlert(randomItem(MESSAGES.tooTired)); return; }
    if (stats.fullness < 15) { showAlert(randomItem(MESSAGES.tooHungry)); return; }
    stats.happiness   = clamp(stats.happiness + 25);
    stats.energy      = clamp(stats.energy - 20);
    stats.fullness    = clamp(stats.fullness - 10);
    animateCat();
    showMessage(randomItem(MESSAGES.play));
    spawnEffect('🎾'); spawnEffect('⭐', 18);
    startCooldown('play');
    updateUI();
  }

  // Tick every second
  let lastTick = Date.now();
  function tick() {
    const now = Date.now();
    const elapsed = (now - lastTick) / 1000;
    lastTick = now;

    stats.fullness    = clamp(stats.fullness    - elapsed / DECAY_RATES.fullness);
    stats.cleanliness = clamp(stats.cleanliness - elapsed / DECAY_RATES.cleanliness);
    stats.happiness   = clamp(stats.happiness   - elapsed / DECAY_RATES.happiness);
    if (stats.energy < 100) {
      stats.energy = clamp(stats.energy + elapsed / ENERGY_RESTORE);
    }
    updateUI();
  }

  // Init
  loadState();
  updateUI();
  refreshIdleMessage();
  setInterval(tick, 1000);
  setInterval(refreshIdleMessage, 9000);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
