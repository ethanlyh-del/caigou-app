<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐱 虛擬貓咪</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff9a9e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="sounds/cat-sounds.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      transition: background 1.2s ease;
    }
    body.mood-sad    { background: linear-gradient(160deg, #e0e0e0 0%, #bdbdbd 100%); }
    body.mood-dirty  { background: linear-gradient(160deg, #dcedc8 0%, #aed581 100%); }
    body.mood-sleepy { background: linear-gradient(160deg, #e8eaf6 0%, #9fa8da 100%); }
    body.mood-angry  { background: linear-gradient(160deg, #fce4ec 0%, #f48fb1 100%); }
    body.mood-sick   { background: linear-gradient(160deg, #e8f5e9 0%, #a5d6a7 100%); }
    body.mood-dead   { background: linear-gradient(160deg, #b0bec5 0%, #607d8b 100%); }

    .app {
      background: rgba(255,255,255,0.93);
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      padding: 18px 18px 22px;
      width: 100%; max-width: 380px;
      position: relative;
    }

    /* ── Naming Screen ─────────────────────────────────────────── */
    #nameScreen {
      position: fixed; inset: 0; z-index: 200;
      background: linear-gradient(160deg, #ffecd2 0%, #fcb69f 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    #nameScreen.hidden { display: none; }
    .name-card {
      background: rgba(255,255,255,0.95); border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
      padding: 32px 24px 28px; width: 100%; max-width: 340px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      text-align: center;
    }
    .name-card .nc-title { font-size: 1.3rem; font-weight: 700; color: #333; }
    .name-card .nc-sub   { font-size: 0.88rem; color: #888; }
    .name-card .nc-img   {
      width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15); border: 3px solid #fcb69f;
    }
    .name-card input[type="text"] {
      width: 100%; padding: 12px 16px; border: 2px solid #f0e0e0;
      border-radius: 14px; font-size: 1.1rem; text-align: center;
      outline: none; transition: border-color 0.2s;
    }
    .name-card input[type="text"]:focus { border-color: #fcb69f; }
    .name-card .nc-btn {
      width: 100%; padding: 14px; background: #fcb69f; color: white;
      border: none; border-radius: 14px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .name-card .nc-btn:active { background: #f5a070; }

    .nc-choose-title { font-size: 0.9rem; color: #888; font-weight: 600; }
    .nc-cat-options {
      display: flex; gap: 16px; justify-content: center; width: 100%;
    }
    .nc-cat-opt {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 8px; padding: 12px 8px; border-radius: 16px;
      border: 3px solid #f0e0e0; cursor: pointer; transition: all 0.2s;
      background: #fafafa;
    }
    .nc-cat-opt:active { transform: scale(0.97); }
    .nc-cat-opt.selected {
      border-color: #fcb69f; background: #fff5f0;
      box-shadow: 0 4px 14px rgba(252,182,159,0.4);
    }
    .nc-cat-opt img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
    .nc-cat-opt span { font-size: 0.9rem; font-weight: 600; color: #555; }

    /* ── Header ─────────────────────────────────────────────────── */
    .header { text-align: center; margin-bottom: 10px; }
    .cat-name { font-size: 1.1rem; font-weight: 700; color: #333; transition: color 0.4s; }
    .cat-name.stray { color: #9e9e9e; }
    .cat-name .stray-tag {
      display: inline-block; background: #9e9e9e; color: white;
      font-size: 0.7rem; border-radius: 8px; padding: 1px 7px; margin-left: 4px;
      vertical-align: middle; font-weight: 600;
    }
    .cat-name .original-name { text-decoration: line-through; font-size: 0.85rem; color: #bbb; }
    .cat-age  { font-size: 0.76rem; color: #aaa; margin-top: 2px; }

    .cat-area {
      position: relative; text-align: center;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 14px;
    }
    .speech-bubble {
      background: white; border: 2px solid #f0e0e0; border-radius: 20px;
      padding: 7px 16px; font-size: 0.87rem; color: #555;
      margin-bottom: 10px; max-width: 240px; min-height: 34px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative;
    }
    .speech-bubble::after {
      content:''; position:absolute; bottom:-11px; left:50%;
      transform:translateX(-50%); border:6px solid transparent; border-top-color:#f0e0e0;
    }
    .speech-bubble::before {
      content:''; position:absolute; bottom:-8px; left:50%;
      transform:translateX(-50%); border:5px solid transparent; border-top-color:white; z-index:1;
    }
    .cat-wrap { display:flex; flex-direction:column; align-items:center; gap:6px; }
    #catImg {
      height:148px; width:148px; object-fit:cover; border-radius:50%;
      cursor:pointer; display:block;
      animation: idle 2.5s ease-in-out infinite;
      -webkit-tap-highlight-color:transparent;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      border: 3px solid rgba(255,255,255,0.8);
      transition: filter 0.3s;
    }
    #catImg.dead-img { filter: grayscale(0.6) brightness(1.3); animation: float-dead 3s ease-in-out infinite; }
    #catImg.bounce   { animation: bounce 0.6s ease forwards; }
    #catImg.sleeping { animation: sleeping 3.5s ease-in-out infinite; }
    #catImg.shake    { animation: shake 0.5s ease forwards; }

    .cat-status {
      font-size: 0.78rem; color: #999; background: white;
      border-radius: 12px; padding: 2px 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    @keyframes idle    { 0%,100%{transform:translateY(0) rotate(0deg)} 35%{transform:translateY(-6px) rotate(-1.5deg)} 70%{transform:translateY(-4px) rotate(1deg)} }
    @keyframes bounce  { 0%{transform:scale(1) rotate(0)} 20%{transform:scale(1.18) rotate(-7deg)} 45%{transform:scale(0.92) rotate(4deg)} 70%{transform:scale(1.06) rotate(-2deg)} 100%{transform:scale(1) rotate(0)} }
    @keyframes sleeping{ 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-3px) rotate(2deg)} }
    @keyframes shake   { 0%{transform:translateX(0)} 15%{transform:translateX(-8px) rotate(-5deg)} 30%{transform:translateX(8px) rotate(5deg)} 45%{transform:translateX(-6px)} 60%{transform:translateX(6px) rotate(3deg)} 75%{transform:translateX(-3px)} 100%{transform:translateX(0) rotate(0)} }
    @keyframes float-dead { 0%,100%{transform:translateY(0) rotate(-3deg) scale(0.95)} 50%{transform:translateY(-10px) rotate(3deg) scale(1.02)} }

    .float-effect {
      position:absolute; font-size:20px; pointer-events:none;
      animation: float-up 1.4s ease-out forwards; z-index:20;
    }
    @keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(0.8)} 30%{opacity:1;transform:translateY(-20px) scale(1.2)} 100%{opacity:0;transform:translateY(-78px) scale(0.9)} }

    /* Stats */
    .stats { margin-bottom:14px; display:flex; flex-direction:column; gap:9px; }
    .stat-row { display:flex; align-items:center; gap:8px; }
    .stat-icon  { font-size:16px; width:20px; flex-shrink:0; }
    .stat-label { font-size:0.79rem; color:#666; width:50px; flex-shrink:0; }
    .stat-bar-bg { flex:1; height:10px; background:#f0f0f0; border-radius:5px; overflow:hidden; }
    .stat-bar { height:100%; border-radius:5px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1), background-color 0.6s; }
    .stat-value { font-size:0.75rem; color:#bbb; width:24px; text-align:right; flex-shrink:0; font-variant-numeric:tabular-nums; }
    .stat-row.health .stat-bar-bg { border: 1px solid #ffd0d0; }

    /* Sick warning */
    .sick-warning {
      background:#fff8e1; border:1px solid #ffc107; border-radius:10px;
      padding:7px 12px; font-size:0.82rem; color:#7a5800;
      margin-bottom:10px; text-align:center; display:none;
    }
    .sick-warning.visible { display:block; }

    .alert { text-align:center; font-size:0.79rem; color:#e53935; min-height:18px; margin-bottom:8px; transition:opacity 0.3s; }

    /* Buttons */
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .action-btn {
      padding:12px 8px 10px; border:none; border-radius:14px;
      cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px;
      transition:transform 0.12s, opacity 0.2s;
      -webkit-tap-highlight-color:transparent;
      position:relative; overflow:hidden;
    }
    .action-btn:active   { transform:scale(0.93); }
    .action-btn:disabled { opacity:0.4; cursor:default; transform:none !important; }
    .action-btn .btn-icon  { font-size:26px; }
    .action-btn .btn-label { font-size:0.78rem; font-weight:600; }
    .btn-feed   { background:#fff3e0; color:#e65100; }
    .btn-clean  { background:#e3f2fd; color:#1565c0; }
    .btn-pet    { background:#fce4ec; color:#c2185b; }
    .btn-play   { background:#e8f5e9; color:#2e7d32; }
    .btn-scare  { background:#fff8e1; color:#f57f17; }
    .btn-hit    { background:#fbe9e7; color:#bf360c; }
    .btn-poop   { background:#efebe9; color:#4e342e; }
    .btn-hospital { background:#e1f5fe; color:#01579b; grid-column:1/-1; display:none; }
    .btn-hospital.visible { display:flex; }
    .btn-sleep  { background:#ede7f6; color:#4527a0; grid-column:1/-1; display:none; }
    .btn-sleep.visible { display:flex; }

    .cooldown-bar {
      position:absolute; bottom:0; left:0; height:3px;
      background:rgba(0,0,0,0.18); border-radius:0 0 14px 14px;
      transition:width 0.1s linear;
    }

    /* Section divider */
    .btn-divider {
      grid-column:1/-1; border:none; border-top:1px dashed #eee;
      margin:2px 0; height:0;
    }

    /* Death overlay */
    #deathOverlay {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,0,0.72); border-radius:28px;
      flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:100;
    }
    #deathOverlay.visible { display:flex; }
    #deathOverlay .death-msg { color:white; font-size:1.3rem; font-weight:700; text-align:center; }
    #deathOverlay .death-sub { color:#ccc; font-size:0.88rem; text-align:center; }
    #deathOverlay .restart-btn {
      background:white; color:#333; border:none; border-radius:20px;
      padding:12px 28px; font-size:1rem; font-weight:700; cursor:pointer;
      box-shadow:0 4px 16px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<!-- Naming Screen -->
<div id="nameScreen">
  <div class="name-card">
    <div class="nc-title">🐾 歡迎來到虛擬貓咪！</div>
    <div class="nc-choose-title">選擇你要收養的貓咪</div>
    <div class="nc-cat-options">
      <div class="nc-cat-opt selected" data-type="orange" onclick="selectCatType('orange')">
        <img id="ncImgOrange" src="cats/kaixin.png" alt="橘貓">
        <span>橘貓</span>
      </div>
      <div class="nc-cat-opt" data-type="kuro" onclick="selectCatType('kuro')">
        <img id="ncImgKuro" src="cats/kuro/kaixin.png" alt="黑貓">
        <span>黑貓</span>
      </div>
    </div>
    <div class="nc-sub">幫牠取個名字吧～</div>
    <input type="text" id="nameInput" placeholder="輸入貓咪的名字" maxlength="10"
      onkeydown="if(event.key==='Enter')confirmName()">
    <button class="nc-btn" onclick="confirmName()">確認收養 ✓</button>
  </div>
</div>

<div class="app">
  <div id="deathOverlay">
    <div class="death-msg">😢 小橘走了...</div>
    <div class="death-sub">好好照顧才能讓貓咪長壽哦</div>
    <button class="restart-btn" onclick="restartCat()">重新認養新貓咪 🐱</button>
  </div>

  <div class="header">
    <div class="cat-name" id="catNameDisplay">🐾 小橘</div>
    <div class="cat-age" id="catAge">第 1 天 · 小貓咪</div>
  </div>

  <div class="cat-area" id="catArea">
    <div class="speech-bubble" id="speechBubble">呼嚕呼嚕♪</div>
    <div class="cat-wrap">
      <img id="catImg" src="cats/kaixin.png" alt="小橘" onclick="petCat()">
      <div class="cat-status" id="catStatus">開心</div>
    </div>
  </div>

  <div class="sick-warning" id="sickWarning">🤒 小橘生病了！趕快帶去醫院！</div>

  <div class="stats">
    <div class="stat-row health">
      <span class="stat-icon">❤️</span><span class="stat-label">健康值</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-health"></div></div>
      <span class="stat-value" id="val-health">100</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">🍖</span><span class="stat-label">飽食度</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-fullness"></div></div>
      <span class="stat-value" id="val-fullness">80</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">🛁</span><span class="stat-label">清潔度</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-cleanliness"></div></div>
      <span class="stat-value" id="val-cleanliness">90</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">💖</span><span class="stat-label">心情</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-happiness"></div></div>
      <span class="stat-value" id="val-happiness">75</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">⚡</span><span class="stat-label">活力</span>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-energy"></div></div>
      <span class="stat-value" id="val-energy">60</span>
    </div>
  </div>

  <div class="alert" id="alertMsg"></div>

  <div class="actions">
    <button class="action-btn btn-feed"     id="btnFeed"     onclick="feedCat()">
      <span class="btn-icon">🍣</span><span class="btn-label">餵食</span>
      <div class="cooldown-bar" id="cd-feed" style="width:0"></div>
    </button>
    <button class="action-btn btn-clean"    id="btnClean"    onclick="cleanCat()">
      <span class="btn-icon">🛁</span><span class="btn-label">清潔</span>
      <div class="cooldown-bar" id="cd-clean" style="width:0"></div>
    </button>
    <button class="action-btn btn-pet"      id="btnPet"      onclick="petCat()">
      <span class="btn-icon">🤍</span><span class="btn-label">撫摸</span>
      <div class="cooldown-bar" id="cd-pet" style="width:0"></div>
    </button>
    <button class="action-btn btn-play"     id="btnPlay"     onclick="playCat()">
      <span class="btn-icon">🎾</span><span class="btn-label">逗貓</span>
      <div class="cooldown-bar" id="cd-play" style="width:0"></div>
    </button>

    <hr class="btn-divider">

    <button class="action-btn btn-scare"    id="btnScare"    onclick="scareCat()">
      <span class="btn-icon">😱</span><span class="btn-label">嚇貓</span>
      <div class="cooldown-bar" id="cd-scare" style="width:0"></div>
    </button>
    <button class="action-btn btn-hit"      id="btnHit"      onclick="hitCat()">
      <span class="btn-icon">👊</span><span class="btn-label">打貓</span>
      <div class="cooldown-bar" id="cd-hit" style="width:0"></div>
    </button>
    <button class="action-btn btn-poop"     id="btnPoop"     onclick="poopCat()">
      <span class="btn-icon">💩</span><span class="btn-label">丟大便</span>
      <div class="cooldown-bar" id="cd-poop" style="width:0"></div>
    </button>

    <button class="action-btn btn-hospital" id="btnHospital" onclick="goHospital()">
      <span class="btn-icon">🏥</span><span class="btn-label">帶去醫院</span>
      <div class="cooldown-bar" id="cd-hospital" style="width:0"></div>
    </button>
    <button class="action-btn btn-sleep"    id="btnSleep"    onclick="sleepCat()">
      <span class="btn-icon">😴</span><span class="btn-label">讓貓咪睡覺</span>
      <div class="cooldown-bar" id="cd-sleep" style="width:0"></div>
    </button>
  </div>
</div>

<script>
// ── IMAGES ───────────────────────────────────────────────────────────────────
let catType = 'orange';
let STATE_IMG, REACT_IMG;

function buildImgMaps() {
  const f = catType === 'kuro' ? 'cats/kuro' : 'cats';
  STATE_IMG = {
    happy:`${f}/kaixin.png`, ecstatic:`${f}/xihuan.png`,
    sleepy:`${f}/pilei.png`, hungry:`${f}/duzi.png`,
    dirty:`${f}/shengqi.png`, unhappy:`${f}/shengqi.png`,
    sick:`${f}/sick.png`, sickbed:`${f}/sickbed.png`, dead:`${f}/dead.png`,
  };
  REACT_IMG = { pet:`${f}/shufu.png`, feed:`${f}/chbao.png`, hit:`${f}/blood.png`, poop:`${f}/dupi.png`, claw:`${f}/claw.png` };
}
buildImgMaps();

let reactionActive=false, reactionTm;

function showReaction(type, ms=2500) {
  const img = document.getElementById('catImg');
  img.src = REACT_IMG[type];
  reactionActive = true;
  clearTimeout(reactionTm);
  reactionTm = setTimeout(() => { reactionActive=false; updateCatImage(); }, ms);
}
function updateCatImage() {
  if (!reactionActive)
    document.getElementById('catImg').src = STATE_IMG[getCatState()] || STATE_IMG.happy;
}

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const DECAY = { fullness:30, cleanliness:45, happiness:60 };
const E_RESTORE = 120;
const COOLDOWNS = { feed:3000, clean:5000, pet:1500, play:4000, scare:8000, hit:5000, poop:5000, hospital:30000, sleep:20000 };
const cdEnd = {};

const MSG = {
  idle:{
    happy:   ['呼嚕呼嚕♪','好滿足～','（搖尾巴）','摸摸我嘛～','我愛你！♡'],
    ecstatic:['我超開心！！','今天是最好的一天！','喵喵喵♡♡♡'],
    hungry:  ['好餓喔...','可以吃飯了嗎？','肚子咕嚕咕嚕'],
    dirty:   ['我好髒...','幫我洗澡嘛','...臭臭的'],
    unhappy: ['哼...','理我一下嘛！','好無聊...','不理你了'],
    sleepy:  ['想睡覺...','Zzz...','好累喔...'],
    sick:    ['好難受...','頭好暈...','嗚嗚...好不舒服','喵嗚...'],
    sickbed: ['救救我...','好痛苦...','喵...喵...'],
  },
  feed:    ['好吃！！','謝謝你！','喵嗚！美味！','還要還要！'],
  clean:   ['舒服～','好香喔！','謝謝你幫我洗澡！','亮晶晶✨'],
  pet:     ['呼嚕呼嚕♪','再摸一下嘛～','好舒服...','嗯嗯嗯♡'],
  play:    ['抓到了！','喵！！！','好好玩！！','我最強！'],
  scare:   ['哇！！！','嚇死我了！','你幹嘛啦！！','太過分了！'],
  hit:     ['嗚...','好痛！！','你壞壞！','嗚嗚嗚...'],
  claw:    ['你敢打我！！','喵—！！！（反擊）','看我爪子！'],
  poop:    ['好臭！！！','嗚...好噁心','變髒了啦！！'],
  hospital:['喵嗚...好害怕','打針好痛...','謝謝醫生...'],
  recover: ['感覺好多了！','終於好了！','要好好照顧我哦'],
  sleep:   ['Zzz...','（蜷成一團）','睡一下就好...'],
  wake:    ['（打哈欠）','睡飽了！','又有精神了！'],
  death:   ['再見了... 喵...'],
};

// ── STATE ────────────────────────────────────────────────────────────────────
let stats, birthDate, lastSaved, isDead=false, catName='小橘', wasStray=false;

function selectCatType(type) {
  catType = type;
  document.querySelectorAll('.nc-cat-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.type === type);
  });
}

function defaultStats() {
  return { fullness:80, cleanliness:90, happiness:75, energy:60, health:100 };
}

function loadState() {
  const raw = localStorage.getItem('catData4');
  if (raw) {
    try {
      const d = JSON.parse(raw);
      catType   = d.catType || 'orange';
      catName   = d.catName || (catType === 'kuro' ? '小黑' : '小橘');
      buildImgMaps();
      birthDate = d.birthDate;
      isDead    = d.isDead || false;
      lastSaved = d.lastSaved || Date.now();
      const elapsed = (Date.now()-lastSaved)/1000;
      const s = d.stats;
      stats = {
        fullness:    clamp(s.fullness    - elapsed/DECAY.fullness),
        cleanliness: clamp(s.cleanliness - elapsed/DECAY.cleanliness),
        happiness:   clamp(s.happiness   - elapsed/DECAY.happiness),
        energy:      clamp(s.energy      + elapsed/E_RESTORE),
        health:      s.health ?? 100,
      };
      // Apply sick health decay retroactively
      if (!isDead) {
        const isSickOnLoad = checkSick(stats);
        if (isSickOnLoad) {
          stats.health = clamp(stats.health - elapsed/20);
          if (stats.health <= 0) { stats.health=0; isDead=true; }
        }
      }
      if (elapsed > 600 && !isDead)
        setTimeout(() => showMessage(`你離開了 ${Math.round(elapsed/60)} 分鐘，${catName}好想你！`), 600);
      return;
    } catch(e) {}
  }
  birthDate = new Date().toISOString().split('T')[0];
  stats = defaultStats();
  lastSaved = Date.now();
}

function saveState() {
  lastSaved = Date.now();
  localStorage.setItem('catData4', JSON.stringify({stats, birthDate, lastSaved, isDead, catName, catType}));
}

function confirmName() {
  const input = document.getElementById('nameInput').value.trim();
  catName = input || (catType === 'kuro' ? '小黑' : '小橘');
  buildImgMaps();
  document.getElementById('nameScreen').classList.add('hidden');
  birthDate = new Date().toISOString().split('T')[0];
  stats = defaultStats();
  lastSaved = Date.now();
  saveState();
  updateUI(); refreshIdle();
}

function clamp(v) { return Math.max(0, Math.min(100, v)); }
function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function checkSick(s=stats) {
  const low = ['fullness','cleanliness','happiness','energy'].filter(k=>s[k]<30).length;
  return low >= 2;
}

function getCatState() {
  if (isDead) return 'dead';
  const isSick = checkSick();
  if (isSick && stats.health < 40) return 'sickbed';
  if (isSick) return 'sick';
  const {fullness:f,cleanliness:c,happiness:h,energy:e} = stats;
  if (e < 20)  return 'sleepy';
  if (f < 25)  return 'hungry';
  if (c < 25)  return 'dirty';
  if (h < 25)  return 'unhappy';
  if (f>75&&c>75&&h>80&&e>65) return 'ecstatic';
  return 'happy';
}

// ── UI ───────────────────────────────────────────────────────────────────────
let speechTm, alertTm;

function showMessage(msg) {
  document.getElementById('speechBubble').textContent = msg;
  clearTimeout(speechTm);
  speechTm = setTimeout(refreshIdle, 3500);
}
function refreshIdle() {
  const state = getCatState();
  const pool = MSG.idle[state] || MSG.idle.happy;
  document.getElementById('speechBubble').textContent = rand(pool);
}
function showAlert(msg) {
  const el = document.getElementById('alertMsg');
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(alertTm);
  alertTm = setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>{el.textContent=''},300); }, 2500);
}
function animateCat(type) {
  const el = document.getElementById('catImg');
  el.classList.remove('bounce','sleeping','shake','dead-img');
  void el.offsetWidth;
  if (type) {
    el.classList.add(type);
    if (type==='bounce'||type==='shake') setTimeout(()=>el.classList.remove(type),650);
  }
}
function spawnEffect(emoji, offX) {
  const area = document.getElementById('catArea');
  const el = document.createElement('span');
  el.className='float-effect'; el.textContent=emoji;
  el.style.left=(28+(offX||0)+Math.random()*36)+'%'; el.style.top='55%';
  area.appendChild(el); setTimeout(()=>el.remove(),1400);
}
function startCooldown(action) {
  const ms = COOLDOWNS[action];
  cdEnd[action] = Date.now()+ms;
  const key = action[0].toUpperCase()+action.slice(1);
  const btn = document.getElementById('btn'+key);
  const bar = document.getElementById('cd-'+action);
  if (btn) btn.disabled=true;
  const iv = setInterval(()=>{
    const rem = cdEnd[action]-Date.now();
    if (rem<=0) { clearInterval(iv); if(bar)bar.style.width='0'; if(btn)btn.disabled=false; }
    else if(bar) bar.style.width=(rem/ms*100)+'%';
  },50);
}

function updateCatName() {
  const el = document.getElementById('catNameDisplay');
  if (!el) return;
  const stray = stats.cleanliness < 20 && !isDead;
  if (stray) {
    el.className = 'cat-name stray';
    el.innerHTML = `🐾 流浪貓 <span class="stray-tag">原名: ${catName}</span>`;
    if (!wasStray) {
      wasStray = true;
      showAlert(`😿 ${catName} 太髒了，變成流浪貓！快幫他洗澡！`);
    }
  } else {
    el.className = 'cat-name';
    el.textContent = `🐾 ${catName}`;
    if (wasStray) {
      wasStray = false;
      showAlert(`✨ ${catName} 洗乾淨了！歡迎回家～`);
    }
  }
}

const STATE_LABEL = {
  happy:'開心', ecstatic:'超開心！', sleepy:'好睏喔', hungry:'肚子餓了',
  dirty:'需要清潔', unhappy:'不開心', sick:'生病中', sickbed:'病得很嚴重', dead:'😢'
};
const STATE_MOOD = {
  sleepy:'mood-sleepy', hungry:'mood-sad', dirty:'mood-dirty', unhappy:'mood-sad',
  sick:'mood-sick', sickbed:'mood-sick', dead:'mood-dead'
};

function triggerDeath() {
  isDead = true;
  reactionActive = true;
  const img = document.getElementById('catImg');
  img.src = STATE_IMG.dead;
  img.classList.remove('bounce','sleeping','shake');
  img.classList.add('dead-img');
  document.getElementById('speechBubble').textContent = rand(MSG.death);
  document.querySelector('#deathOverlay .death-msg').textContent = `😢 ${catName}走了...`;
  document.getElementById('deathOverlay').classList.add('visible');
  document.querySelectorAll('.action-btn').forEach(b=>b.disabled=true);
  document.body.className = 'mood-dead';
  updateCatName();
  playSound('death');
  saveState();
}

function restartCat() {
  isDead = false; reactionActive = false; wasStray = false;
  localStorage.removeItem('catData4');
  document.getElementById('deathOverlay').classList.remove('visible');
  document.querySelectorAll('.action-btn').forEach(b=>b.disabled=false);
  document.getElementById('catImg').classList.remove('dead-img');
  document.body.className = '';
  // Show naming screen for new cat
  document.getElementById('nameInput').value = '';
  document.getElementById('nameScreen').classList.remove('hidden');
}

function updateUI() {
  if (isDead) { triggerDeath(); return; }
  const state = getCatState();
  const isSick = checkSick();
  updateCatImage();
  updateCatName();
  document.getElementById('catStatus').textContent = STATE_LABEL[state]||'開心';
  document.body.className = STATE_MOOD[state]||'';

  document.getElementById('sickWarning').textContent = `🤒 ${catName}生病了！趕快帶去醫院！`;
  document.getElementById('sickWarning').classList.toggle('visible', isSick);
  document.getElementById('btnHospital').classList.toggle('visible', isSick || stats.health<60);
  document.getElementById('btnSleep').classList.toggle('visible', stats.energy<35);

  // Health bar special color
  const hv = stats.health;
  const hbar = document.getElementById('bar-health');
  hbar.style.width = hv+'%';
  hbar.style.backgroundColor = hv>70 ? '#ef5350' : hv>40 ? '#ff8a65' : '#9e9e9e';
  document.getElementById('val-health').textContent = Math.round(hv);

  for (const key of ['fullness','cleanliness','happiness','energy']) {
    const v = stats[key];
    const bar = document.getElementById('bar-'+key);
    bar.style.width = v+'%';
    bar.style.backgroundColor = v>55?'#66bb6a':v>28?'#ffa726':'#ef5350';
    document.getElementById('val-'+key).textContent = Math.round(v);
  }

  updateCatName();
  const days = Math.floor((Date.now()-new Date(birthDate))/86400000)+1;
  document.getElementById('catAge').textContent = `第 ${days} 天 · 小貓咪`;
  saveState();
}

// ── SOUND ────────────────────────────────────────────────────────────────────
function playSound(type) {
  try {
    const src = (typeof CAT_SOUNDS!=='undefined') ? CAT_SOUNDS[type]||CAT_SOUNDS.meow : null;
    if (!src) return;
    const a = new Audio(src); a.volume=0.75; a.play().catch(()=>{});
  } catch(e) {}
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function feedCat() {
  if (stats.fullness>=98) { showAlert('我已經很飽了！'); return; }
  stats.fullness  = clamp(stats.fullness+30);
  stats.happiness = clamp(stats.happiness+5);
  animateCat('bounce'); showMessage(rand(MSG.feed));
  spawnEffect('🍣'); spawnEffect('✨',22);
  playSound('happy'); showReaction('feed'); startCooldown('feed'); updateUI();
}
function cleanCat() {
  if (stats.cleanliness>=96) { showAlert('我已經很乾淨了！'); return; }
  stats.cleanliness = clamp(stats.cleanliness+55);
  stats.happiness   = clamp(stats.happiness+10);
  animateCat('bounce'); showMessage(rand(MSG.clean));
  spawnEffect('✨'); spawnEffect('💧',22);
  playSound('meow'); startCooldown('clean'); updateUI();
}
function petCat() {
  if (stats.energy<8) { showAlert('太累了，想睡覺...'); return; }
  stats.happiness = clamp(stats.happiness+18);
  stats.energy    = clamp(stats.energy-3);
  animateCat('bounce'); showMessage(rand(MSG.pet));
  spawnEffect('💕'); spawnEffect('💗',22);
  playSound('happy'); showReaction('pet'); startCooldown('pet'); updateUI();
}
function playCat() {
  if (stats.energy<15)   { showAlert('太累了，沒力氣玩...'); return; }
  if (stats.fullness<15) { showAlert('太餓了，沒力氣玩...'); return; }
  stats.happiness = clamp(stats.happiness+25);
  stats.energy    = clamp(stats.energy-20);
  stats.fullness  = clamp(stats.fullness-10);
  animateCat('bounce'); showMessage(rand(MSG.play));
  spawnEffect('🎾'); spawnEffect('⭐',22);
  playSound('play'); startCooldown('play'); updateUI();
}
function scareCat() {
  stats.happiness = clamp(stats.happiness-20);
  reactionActive=true;
  document.getElementById('catImg').src = STATE_IMG.unhappy;
  document.body.className='mood-angry';
  animateCat('shake'); showMessage(rand(MSG.scare));
  spawnEffect('💢'); spawnEffect('😤',22);
  playSound('angry'); startCooldown('scare');
  clearTimeout(reactionTm);
  reactionTm = setTimeout(()=>{ reactionActive=false; updateUI(); }, 2500);
}
function hitCat() {
  stats.health    = clamp(stats.health-20);
  stats.happiness = clamp(stats.happiness-15);
  startCooldown('hit');

  const clawBack = Math.random() < 0.3;
  if (clawBack) {
    // Cat retaliates!
    animateCat('shake');
    document.getElementById('catImg').src = REACT_IMG.claw;
    reactionActive = true;
    showMessage(rand(MSG.claw));
    spawnEffect('🐾'); spawnEffect('💥',22);
    playSound('claw');
    showAlert('被貓抓傷了！');
    clearTimeout(reactionTm);
    reactionTm = setTimeout(()=>{
      reactionActive=false;
      if (!isDead) { document.getElementById('catImg').src = REACT_IMG.hit; reactionActive=true; }
      setTimeout(()=>{ reactionActive=false; updateUI(); }, 1500);
    }, 1500);
  } else {
    animateCat('shake'); showMessage(rand(MSG.hit));
    spawnEffect('👊'); spawnEffect('💢',22);
    playSound('hit'); showReaction('hit');
  }

  if (stats.health<=0) { stats.health=0; setTimeout(triggerDeath,1800); }
  else updateUI();
}
function poopCat() {
  stats.cleanliness = clamp(stats.cleanliness-30);
  stats.happiness   = clamp(stats.happiness-10);
  animateCat('shake'); showMessage(rand(MSG.poop));
  spawnEffect('💩'); spawnEffect('🤢',22);
  playSound('angry'); showReaction('poop'); startCooldown('poop'); updateUI();
}
function goHospital() {
  if (!checkSick() && stats.health>=80) { showAlert(`${catName}現在很健康！`); return; }
  stats.health    = clamp(stats.health+60);
  stats.happiness = clamp(stats.happiness-5);
  stats.cleanliness = clamp(stats.cleanliness+10);
  reactionActive=true;
  document.getElementById('catImg').src = STATE_IMG.sickbed;
  showMessage(rand(MSG.hospital));
  playSound('sick'); startCooldown('hospital');
  clearTimeout(reactionTm);
  reactionTm = setTimeout(()=>{
    reactionActive=false;
    showMessage(rand(MSG.recover));
    playSound('hospital');
    animateCat('bounce'); updateUI();
  }, 3000);
}
function sleepCat() {
  stats.energy = clamp(stats.energy+45);
  animateCat('sleeping'); showMessage(rand(MSG.sleep));
  spawnEffect('💤'); spawnEffect('⭐',22); startCooldown('sleep');
  setTimeout(()=>{
    reactionActive=false; animateCat('bounce');
    showMessage(rand(MSG.wake)); playSound('meow'); updateUI();
  }, 3000);
  updateUI();
}

// ── TICK ─────────────────────────────────────────────────────────────────────
let lastTick = Date.now();
function tick() {
  if (isDead) return;
  const now = Date.now();
  const e = (now-lastTick)/1000; lastTick=now;

  stats.fullness    = clamp(stats.fullness    - e/DECAY.fullness);
  stats.cleanliness = clamp(stats.cleanliness - e/DECAY.cleanliness);
  stats.happiness   = clamp(stats.happiness   - e/DECAY.happiness);
  if (stats.energy<100) stats.energy = clamp(stats.energy + e/E_RESTORE);

  const isSick = checkSick();
  if (isSick) {
    stats.health = clamp(stats.health - e/20);  // -1 per 20s when sick
    if (stats.health<=0) { stats.health=0; triggerDeath(); return; }
  } else if (stats.health<100) {
    stats.health = clamp(stats.health + e/120); // slow recovery when healthy
  }
  updateUI();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadState();
const hasSave = !!localStorage.getItem('catData4');
if (!hasSave) {
  // First visit: show naming screen
  document.getElementById('nameScreen').classList.remove('hidden');
} else {
  document.getElementById('nameScreen').classList.add('hidden');
  if (isDead) triggerDeath();
  else { updateUI(); refreshIdle(); }
}
setInterval(tick, 1000);
setInterval(()=>{ if (!isDead) refreshIdle(); }, 9000);

if ('serviceWorker' in navigator)
  navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));
</script>
