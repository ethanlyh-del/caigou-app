<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>рҹҗұ иҷӣж“¬иІ“е’Ә</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff9a9e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="иҷӣж“¬иІ“е’Ә">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      transition: background 1.2s ease;
    }
    body.mood-sad    { background: linear-gradient(160deg, #e0e0e0 0%, #bdbdbd 100%); }
    body.mood-dirty  { background: linear-gradient(160deg, #dcedc8 0%, #aed581 100%); }
    body.mood-sleepy { background: linear-gradient(160deg, #e8eaf6 0%, #9fa8da 100%); }

    .app {
      background: rgba(255,255,255,0.93);
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      padding: 22px 20px 26px;
      width: 100%; max-width: 380px;
    }

    .header { text-align: center; margin-bottom: 14px; }
    .cat-name { font-size: 1.1rem; font-weight: 700; color: #333; }
    .cat-age  { font-size: 0.76rem; color: #aaa; margin-top: 2px; }

    .cat-area {
      position: relative;
      text-align: center;
      height: 200px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }

    .speech-bubble {
      background: white;
      border: 2px solid #f0e0e0;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 0.87rem; color: #555;
      margin-bottom: 10px;
      max-width: 230px; min-height: 34px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      position: relative;
    }
    .speech-bubble::after {
      content: ''; position: absolute; bottom: -11px; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent; border-top-color: #f0e0e0;
    }
    .speech-bubble::before {
      content: ''; position: absolute; bottom: -8px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent; border-top-color: white; z-index: 1;
    }

    .cat-wrap { position: relative; display: inline-block; }

    #catSVG {
      cursor: pointer; display: block;
      animation: idle 2.5s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.13));
    }
    #catSVG.bounce   { animation: bounce 0.6s ease forwards; }
    #catSVG.sleeping { animation: sleeping 3.5s ease-in-out infinite; }

    @keyframes idle {
      0%,100% { transform: translateY(0) rotate(0deg); }
      35% { transform: translateY(-7px) rotate(-1.5deg); }
      70% { transform: translateY(-5px) rotate(1deg); }
    }
    @keyframes bounce {
      0%  { transform: scale(1) rotate(0); }
      20% { transform: scale(1.22) rotate(-8deg); }
      45% { transform: scale(0.9) rotate(5deg); }
      70% { transform: scale(1.08) rotate(-2deg); }
      100%{ transform: scale(1) rotate(0); }
    }
    @keyframes sleeping {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-4px) rotate(3deg); }
    }

    .cat-status-badge {
      position: absolute; bottom: -2px; right: -18px;
      background: white; border-radius: 10px;
      padding: 2px 8px; font-size: 0.7rem; color: #888;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      white-space: nowrap;
    }

    .float-effect {
      position: absolute; font-size: 20px;
      pointer-events: none;
      animation: float-up 1.4s ease-out forwards;
      z-index: 20;
    }
    @keyframes float-up {
      0%   { opacity:1; transform: translateY(0) scale(0.8); }
      30%  { opacity:1; transform: translateY(-20px) scale(1.2); }
      100% { opacity:0; transform: translateY(-78px) scale(0.9); }
    }

    .stats { margin-bottom: 18px; display: flex; flex-direction: column; gap: 10px; }
    .stat-row { display: flex; align-items: center; gap: 9px; }
    .stat-icon  { font-size: 17px; width: 22px; flex-shrink: 0; }
    .stat-label { font-size: 0.8rem; color: #666; width: 50px; flex-shrink: 0; }
    .stat-bar-bg { flex: 1; height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
    .stat-bar {
      height: 100%; border-radius: 5px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1), background-color 0.6s;
    }
    .stat-value {
      font-size: 0.76rem; color: #bbb;
      width: 26px; text-align: right; flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .alert {
      text-align: center; font-size: 0.79rem; color: #e53935;
      min-height: 18px; margin-bottom: 10px; transition: opacity 0.3s;
    }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .action-btn {
      padding: 13px 8px 11px; border: none; border-radius: 16px;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px;
      transition: transform 0.12s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      position: relative; overflow: hidden;
    }
    .action-btn:active   { transform: scale(0.93); }
    .action-btn:disabled { opacity: 0.4; cursor: default; transform: none !important; }
    .action-btn .btn-icon  { font-size: 28px; }
    .action-btn .btn-label { font-size: 0.8rem; font-weight: 600; }

    .btn-feed  { background: #fff3e0; color: #e65100; }
    .btn-clean { background: #e3f2fd; color: #1565c0; }
    .btn-pet   { background: #fce4ec; color: #c2185b; }
    .btn-play  { background: #e8f5e9; color: #2e7d32; }
    .btn-sleep {
      grid-column: 1 / -1;
      background: #ede7f6; color: #4527a0;
      display: none;
    }
    .btn-sleep.visible { display: flex; }

    .cooldown-bar {
      position: absolute; bottom: 0; left: 0;
      height: 3px; background: rgba(0,0,0,0.18);
      border-radius: 0 0 16px 16px;
      transition: width 0.1s linear;
    }
  </style>
</head>

  wake:  ['пјҲжү“е“Ҳж¬ пјү', 'зқЎйЈҪдәҶпјҒ', 'еҸҲжңүзІҫзҘһдәҶпјҒ', 'е–өпҪһж—©е®үпјҒ'],

// в”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let stats, birthDate, lastSaved;

function loadState() {
  const raw = localStorage.getItem('catData3');
  if (raw) {
    try {
      const d = JSON.parse(raw);
      birthDate = d.birthDate;
      lastSaved = d.lastSaved || Date.now();
      const elapsed = (Date.now() - lastSaved) / 1000;
      stats = {
        fullness:    clamp(d.stats.fullness    - elapsed / DECAY.fullness),
        cleanliness: clamp(d.stats.cleanliness - elapsed / DECAY.cleanliness),
        happiness:   clamp(d.stats.happiness   - elapsed / DECAY.happiness),
        energy:      clamp(d.stats.energy      + elapsed / E_RESTORE),
      };
      if (elapsed > 600)
        setTimeout(() => showMessage(`дҪ йӣўй–ӢдәҶ ${Math.round(elapsed/60)} еҲҶйҗҳпјҢе°Ҹж©ҳеҘҪжғідҪ пјҒ`), 600);
      return;
    } catch(e) {}
  }
  // First visit
  birthDate = new Date().toISOString().split('T')[0];
  stats = { fullness: 80, cleanliness: 90, happiness: 75, energy: 60 };
  lastSaved = Date.now();
}

function saveState() {
  lastSaved = Date.now();
  localStorage.setItem('catData3', JSON.stringify({ stats, birthDate, lastSaved }));
}

function clamp(v) { return Math.max(0, Math.min(100, v)); }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getCatState() {
  const { fullness, cleanliness, happiness, energy } = stats;
  if (energy < 20)      return 'sleepy';
  if (fullness < 25)    return 'hungry';
  if (cleanliness < 25) return 'dirty';
  if (happiness < 25)   return 'unhappy';
  if (fullness > 75 && cleanliness > 75 && happiness > 80 && energy > 65) return 'ecstatic';
  return 'happy';
}

// в”Җв”Җ UI в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let speechTm, alertTm;

function showMessage(msg) {
  document.getElementById('speechBubble').textContent = msg;
  clearTimeout(speechTm);
  speechTm = setTimeout(refreshIdle, 3500);
}

function refreshIdle() {
  const pool = MESSAGES.idle[getCatState()] || MESSAGES.idle.happy;
  document.getElementById('speechBubble').textContent = rand(pool);
}

function showAlert(msg) {
  const el = document.getElementById('alertMsg');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(alertTm);
  alertTm = setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = ''; }, 300);
  }, 2500);
}

function animateCat(type) {
  const el = document.getElementById('catSVG');
  el.classList.remove('bounce', 'sleeping');
  void el.offsetWidth;
  if (type) {
    el.classList.add(type);
    if (type === 'bounce') setTimeout(() => el.classList.remove('bounce'), 650);
  }
}

function spawnEffect(emoji, offX) {
  const area = document.getElementById('catArea');
  const el = document.createElement('span');
  el.className = 'float-effect';
  el.textContent = emoji;
  el.style.left = (28 + (offX || 0) + Math.random() * 36) + '%';
  el.style.top  = '55%';
  area.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function startCooldown(action) {
  const ms  = COOLDOWNS[action];
  cooldownEnd[action] = Date.now() + ms;
  const key = action[0].toUpperCase() + action.slice(1);
  const btn = document.getElementById('btn' + key);
  const bar = document.getElementById('cd-' + action);
  if (btn) btn.disabled = true;
  const iv = setInterval(() => {
    const rem = cooldownEnd[action] - Date.now();
    if (rem <= 0) {
      clearInterval(iv);
      if (bar) bar.style.width = '0';
      if (btn) btn.disabled = false;
    } else {
      if (bar) bar.style.width = (rem / ms * 100) + '%';
    }
  }, 50);
}

const STATE_LABEL = { happy:'й–Ӣеҝғ', ecstatic:'и¶…й–ӢеҝғпјҒ', sleepy:'еҘҪзқҸе–”', hungry:'иӮҡеӯҗйӨ“дәҶ', dirty:'йңҖиҰҒжё…жҪ”', unhappy:'дёҚй–Ӣеҝғ' };
const STATE_MOOD  = { sleepy:'mood-sleepy', hungry:'mood-sad', dirty:'mood-dirty', unhappy:'mood-sad' };

function updateUI() {
  const state = getCatState();
  const expr = EXPR[state] || EXPR.happy;
  document.getElementById('exprLayer').innerHTML = expr.eyes + expr.mouth;
  document.getElementById('catStatus').textContent = STATE_LABEL[state] || 'й–Ӣеҝғ';
  document.body.className = STATE_MOOD[state] || '';

  document.getElementById('btnSleep').classList.toggle('visible', stats.energy < 35);

  for (const key of ['fullness','cleanliness','happiness','energy']) {
    const v = stats[key];
    const bar = document.getElementById('bar-' + key);
    bar.style.width = v + '%';
    bar.style.backgroundColor = v > 55 ? '#66bb6a' : v > 28 ? '#ffa726' : '#ef5350';
    document.getElementById('val-' + key).textContent = Math.round(v);
  }

  const days = Math.floor((Date.now() - new Date(birthDate)) / 86400000) + 1;
  document.getElementById('catAge').textContent = `з¬¬ ${days} еӨ© В· е°ҸиІ“е’Ә`;

  saveState();
}

// в”Җв”Җ SOUND в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let audioCtx;
function meow(type) {
  try {
    if (!audioCtx || audioCtx.state === 'closed')
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    filter.type = 'bandpass'; filter.Q.value = 1.8;
    osc.type = 'sawtooth';
    const t = audioCtx.currentTime;

    const configs = {
      happy:  { fq: 1200, freqs: [[600,0],[1100,.12],[700,.35]], vol: .13, dur: .45 },
      hungry: { fq:  800, freqs: [[350,0],[600,.2],[350,.7]],    vol: .11, dur: .8  },
      play:   { fq: 1500, freqs: [[800,0],[1400,.08],[900,.25]], vol: .15, dur: .3  },
      default:{ fq: 1000, freqs: [[500,0],[900,.15],[500,.45]],  vol: .12, dur: .55 },
    };
    const c = configs[type] || configs.default;
    filter.frequency.value = c.fq;
    c.freqs.forEach(([f,dt]) =>
      dt === 0
        ? osc.frequency.setValueAtTime(f, t)
        : osc.frequency.linearRampToValueAtTime(f, t + dt)
    );
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(c.vol, t + 0.05);
    gain.gain.setValueAtTime(c.vol, t + c.dur * 0.7);
    gain.gain.linearRampToValueAtTime(0, t + c.dur);
    osc.start(t); osc.stop(t + c.dur + 0.05);
  } catch(e) {}
}

// в”Җв”Җ ACTIONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function feedCat() {
  if (stats.fullness >= 98) { showAlert('жҲ‘е·Із¶“еҫҲйЈҪдәҶпјҒ'); return; }
  stats.fullness   = clamp(stats.fullness + 30);
  stats.happiness  = clamp(stats.happiness + 5);
  animateCat('bounce');
  showMessage(rand(MESSAGES.feed));
  spawnEffect('рҹҚЈ'); spawnEffect('вңЁ', 22);
  meow('happy');
  startCooldown('feed');
  updateUI();
}

function cleanCat() {
  if (stats.cleanliness >= 96) { showAlert('жҲ‘е·Із¶“еҫҲд№ҫж·ЁдәҶпјҒ'); return; }
  stats.cleanliness = clamp(stats.cleanliness + 55);
  stats.happiness   = clamp(stats.happiness + 10);
  animateCat('bounce');
  showMessage(rand(MESSAGES.clean));
  spawnEffect('вңЁ'); spawnEffect('рҹ’§', 22);
  meow();
  startCooldown('clean');
  updateUI();
}

function petCat() {
  if (stats.energy < 8) { showAlert('еӨӘзҙҜдәҶпјҢжғізқЎиҰә...'); return; }
  stats.happiness = clamp(stats.happiness + 18);
  stats.energy    = clamp(stats.energy - 3);
  animateCat('bounce');
  showMessage(rand(MESSAGES.pet));
  spawnEffect('рҹ’•'); spawnEffect('рҹ’—', 22);
  meow('happy');
  startCooldown('pet');
  updateUI();
}

function playCat() {
  if (stats.energy < 15)   { showAlert('еӨӘзҙҜдәҶпјҢжІ’еҠӣж°ЈзҺ©...'); return; }
  if (stats.fullness < 15) { showAlert('еӨӘйӨ“дәҶпјҢжІ’еҠӣж°ЈзҺ©...'); return; }
  stats.happiness = clamp(stats.happiness + 25);
  stats.energy    = clamp(stats.energy - 20);
  stats.fullness  = clamp(stats.fullness - 10);
  animateCat('bounce');
  showMessage(rand(MESSAGES.play));
  spawnEffect('рҹҺҫ'); spawnEffect('вӯҗ', 22);
  meow('play');
  startCooldown('play');
  updateUI();
}

function sleepCat() {
  stats.energy = clamp(stats.energy + 45);
  animateCat('sleeping');
  showMessage(rand(MESSAGES.sleep));
  spawnEffect('рҹ’Ө'); spawnEffect('вӯҗ', 22);
  startCooldown('sleep');
  setTimeout(() => {
    animateCat('bounce');
    showMessage(rand(MESSAGES.wake));
    meow();
    updateUI();
  }, 3000);
  updateUI();
}

// в”Җв”Җ TICK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let lastTick = Date.now();
function tick() {
  const now = Date.now();
  const e = (now - lastTick) / 1000;
  lastTick = now;
  stats.fullness    = clamp(stats.fullness    - e / DECAY.fullness);
  stats.cleanliness = clamp(stats.cleanliness - e / DECAY.cleanliness);
  stats.happiness   = clamp(stats.happiness   - e / DECAY.happiness);
  if (stats.energy < 100) stats.energy = clamp(stats.energy + e / E_RESTORE);
  updateUI();
}

// в”Җв”Җ INIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
loadState();
updateUI();
refreshIdle();
setInterval(tick, 1000);
setInterval(refreshIdle, 9000);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
